<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A personalized browser start page with time display, focus timer, task management, and quick links">
    <title>ToDo Dashboard - Darlene Asalui</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header">
        <button class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
        <div class="settings-panel">
            <button class="settings-toggle" aria-label="Open settings">⚙️</button>
            <div class="settings-dropdown">
                <label for="timer-duration">Timer Duration (minutes):</label>
                <input type="number" id="timer-duration" min="1" max="120" value="25">
                <button class="apply-timer-settings">Apply</button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Greeting Display Component -->
        <section id="greeting" class="greeting-section">
            <div class="time-display"></div>
            <div class="date-display"></div>
            <div class="greeting-message"></div>
        </section>

        <!-- Focus Timer Component -->
        <section id="timer" class="timer-section">
            <h2>Focus Timer</h2>
            <div class="timer-display">25:00</div>
            <div class="timer-controls">
                <button class="btn-start">Start</button>
                <button class="btn-stop">Stop</button>
                <button class="btn-reset">Reset</button>
            </div>
        </section>

        <!-- Task List Component -->
        <section id="tasks" class="tasks-section">
            <div class="tasks-header">
                <h2>Tasks</h2>
                <div class="task-controls">
                    <select class="task-sort">
                        <option value="date-desc">Newest First</option>
                        <option value="date-asc">Oldest First</option>
                        <option value="alpha-asc">A-Z</option>
                        <option value="alpha-desc">Z-A</option>
                        <option value="status-incomplete">Incomplete First</option>
                        <option value="status-complete">Completed First</option>
                    </select>
                </div>
            </div>
            <form class="task-form">
                <input type="text" class="task-input" placeholder="Add a new task..." maxlength="500">
                <button type="submit" class="btn-add-task">Add</button>
            </form>
            <ul class="task-list"></ul>
        </section>

        <!-- Quick Links Component -->
        <section id="links" class="links-section">
            <h2>Quick Links</h2>
            <form class="link-form">
                <input type="url" class="link-url-input" placeholder="URL (https://...)" required>
                <input type="text" class="link-name-input" placeholder="Display name" maxlength="50" required>
                <button type="submit" class="btn-add-link">Add Link</button>
            </form>
            <div class="links-container"></div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
